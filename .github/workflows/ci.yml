name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LEGAL.md"
      - "tokenbar.pdf"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - "LEGAL.md"
      - "tokenbar.pdf"
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: swift test (macOS 26, Swift 6)
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          sw_vers

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: swift test (TokenBarCore)
        run: script/test.sh

  project-yml:
    name: project.yml regenerates cleanly
    runs-on: macos-26
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: xcodegen generate (no diff)
        run: |
          xcodegen generate --spec project.yml --project .
          # If regeneration produced any tracked-file diff, fail loudly.
          if ! git diff --quiet -- TokenBar.xcodeproj; then
            echo "::error::xcodegen produced unexpected changes — re-run \`xcodegen generate --spec project.yml --project .\` and commit."
            git --no-pager diff -- TokenBar.xcodeproj | head -200
            exit 1
          fi
